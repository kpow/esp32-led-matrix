[platformio]
default_envs = lcd-169
src_dir = .

[env]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board_build.filesystem = LittleFS
monitor_speed = 115200
extra_scripts = name_firmware.py
lib_deps =
    fastled/FastLED@3.10.3
    lewisxhe/SensorLib@0.4.0
    bblanchon/ArduinoJson@7.4.3

[env:lcd-169]
board = esp32-s3-devkitc-1
build_flags =
    -DBOARD_ESP32S3_LCD_169
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@1.2.19

[env:lcd-13]
board = esp32-s3-devkitc-1
build_flags =
    -DBOARD_ESP32S3_LCD_13
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@1.2.19

[env:m5cores3]
board = m5stack-cores3
build_flags =
    -DBOARD_M5CORES3
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified@0.2.13
    https://github.com/m5stack/M5-SAM2695.git

[env:matrix]
board = esp32-s3-devkitc-1
build_flags =
    -DBOARD_ESP32S3_MATRIX
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
